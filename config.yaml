# LightHermes 配置文件

secrets:
  env_file: .env.local

# 模型配置
model:
  provider: openai
  model_name: gpt-5.4-mini
  api_key: ${OPENAI_API_KEY}
  base_url: https://api.api2cn.com/v1
  fallback_models:
    - gpt-5.4  # API 失败时自动切换

embedding:
  provider: openai
  model_name: BAAI/bge-m3
  api_key: ${SILICONFLOW_API_KEY}
  base_url: https://api.siliconflow.cn/v1

# 记忆配置
memory:
  enabled: true
  storage_dir: memory

  # 自适应记忆配置
  adaptive:
    enabled: true
    adapt_interval: 100  # 每 100 次查询评估一次
    archive_days: 30     # 30 天未访问则归档

  # 混合检索配置 (可选 - 提升记忆检索精度)
  # 默认使用简单关键词匹配,无需额外依赖
  # 启用混合检索需要: pip install sentence-transformers (本地) 或使用 OpenAI API
  hybrid_retrieval:
    enabled: true                # 是否启用混合检索 (默认 false)
    min_candidates: 5            # TF-IDF 候选少于该值时触发 embedding fallback
    fallback_to_all: true        # 候选不足时回退到全量语义记忆 embedding rerank
    semantic_threshold: 0.35     # 过滤低于该相似度的结果；可按模型调参
    score_margin: 0.12           # 只保留接近 top 分数的结果，减少尾部噪声
    full_rerank_max_docs: 200    # 全量 rerank 的最大语义记忆条数
    tfidf_candidate_limit: 20    # TF-IDF 初筛候选上限

  retention:
    short_term_turns: 50
    working_memory_days: 7
    episodic_auto_archive: true
    semantic_max_entries: 1000
    semantic_max_chars: 200000
    semantic_similarity_threshold: 0.85
    distill_recent_limit: 20

# 进化配置
evolution:
  enabled: true
  auto_generate_skills: true
  skill_validation: sandbox
  triggers:
    min_success_count: 3
    min_failure_count: 2
  sandbox:
    timeout: 30
    max_memory_mb: 512

# 技能配置
skills:
  enabled: true
  auto_load: true
  dirs:
    - skills/core
    - skills/user
    - skills/generated
  disabled: []

# 工具配置
# 内置文件工具默认关闭；开启后仍受 roots、敏感文件和大小限制保护
# file_write 必须单独显式开启，不会被 file_read/file_search 隐式启用
tools:
  builtin:
    enabled: true
    memory_search: true
    file_read: false
    file_search: false
    file_write: false
    roots:
      - .
    max_read_chars: 20000
    max_write_chars: 20000
    max_search_results: 20

# 插件配置
plugins:
  dirs:
    - plugins/tools
    - plugins/memory

# 上下文压缩配置
context_compression:
  enabled: true

  # 触发阈值（当 token 使用达到上下文窗口的 75% 时触发压缩）
  trigger_threshold: 0.75

  # 摘要模型（默认使用便宜模型节省成本）
  summary_model: gpt-5.4-mini
  # summary_model: null  # 使用主模型

  # 保护策略
  protect_first_n: 3  # 保护前 N 条消息（系统提示 + 初始对话）
  protect_recent_tokens: 20000  # 保护最近 N tokens 的对话

  # 摘要预算
  summary_min_tokens: 2000
  summary_max_tokens: 12000
  summary_ratio: 0.20  # 压缩内容的 20%

  # 可选：压缩时提取关键信息到记忆系统
  extract_to_memory: false

# CLI 配置
cli:
  prompt_symbol: ">"
  show_banner: true
  stream_output: true # MiniMax Anthropic 兼容流式已通过 smoke test
  show_skill_usage: true
  color_enabled: true

# 日志配置
logging:
  level: INFO
  file: logs/lighthermes.log
  debug: false
